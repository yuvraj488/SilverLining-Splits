<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create account · SilverLining-Splits</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <main class="auth-panel" style="min-height:100vh">
    <section class="auth-card" id="signupCard">
      <a href="/index.html" class="brand-link"><span class="brand-icon">✦</span> SilverLining-Splits</a>
      <h1 class="auth-heading">Create account</h1>
      <p class="auth-sub">A quieter way to split shared costs.</p>
      <form class="auth-form" id="signupForm" novalidate>
        <label class="input-group"><span class="input-label">Full Name</span><input class="input" id="name" required><span class="input-error" id="nameError"></span></label>
        <label class="input-group"><span class="input-label">Email</span><input class="input" id="email" type="email" required><span class="input-error" id="emailError"></span></label>
        <label class="input-group"><span class="input-label">Password</span><input class="input" id="password" type="password" autocomplete="new-password" required><div class="strength"><span id="strengthBar"></span></div><span class="input-error" id="passwordError"></span></label>
        <label class="input-group"><span class="input-label">Confirm Password</span><input class="input" id="confirmPassword" type="password" autocomplete="new-password" required><span class="input-error" id="confirmError"></span></label>
        <button class="btn btn-primary btn-full" id="signupBtn" type="submit">Create account</button>
      </form>
      <p class="auth-foot">Already have an account? <a class="auth-link" href="/index.html">Sign in</a></p>
    </section>
  </main>
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
